# Copy this file to config.yaml and edit local paths/API keys before running.

# Default document.
input_file: data/input/MorganStanleyQ10.pdf

# PaddleOCR-VL Docker runtime.
paddleocrvl_offline_image: ccr-2vdh3abv-pub.cnc.bj.baidubce.com/paddlepaddle/paddleocr-vl:latest-nvidia-gpu-sm120-offline
paddleocrvl_server_image: ccr-2vdh3abv-pub.cnc.bj.baidubce.com/paddlepaddle/paddleocr-genai-vllm-server:latest-nvidia-gpu-sm120
paddleocrvl_disable_vllm: false
paddleocrvl_auto_start_vllm: true

paddleocrvl_model_volume: paddleocrvl-model
paddleocrvl_container_model_dir: /home/paddleocr/.paddlex/official_models/PaddleOCR-VL-1.6
paddleocrvl_local_model_dir: "C:\\path\\to\\PaddleOCR-VL-1.6"
paddleocrvl_vllm_config: scripts\vllm_server_config.yml
paddleocrvl_server_port: 8118
paddleocr_output_dir: data/output

# OpenAI-compatible vision endpoint.
vision_binding_host: https://api.example.com/v1
vision_binding_api_key: <your api key>
vision_model: Qwen/Qwen3-VL-8B-Instruct

# Local SentenceTransformer embedding model used for FAISS indexing/search.
embedding_model: BAAI/bge-m3

# Text chunking / semantic merge defaults.
text_chunking:
  language: english
  output_suffix: sentence_split
  initial_chunk_output_suffix: initial_chunks
  chunk_output_suffix: chunk_merge
  window: 6
  overlap: 2
  step: 4
  embedding_model: BAAI/bge-base-en-v1.5
  breakpoint_percentile: 95
  merge_similarity_threshold: 0.85
  max_tokens: 512
  max_embedding_tokens: 512
  max_sentence_gap: 5
  merge_safety_ratio: 0.40
  high_overlap_threshold: 0.80
  small_chunk_repair: true
  small_chunk_sentence_count: 1
  short_previous_merge: true
  short_previous_max_tokens: 20
  duplicate_overlap_threshold: 0.80
  embed_batch_size: 32
  device:

# Table/image enrichment defaults.
enrichment:
  batch_size: 5
  single_fallback_retries: 3
  table_prompt: prompts/table_enrichment_prompt.py
  image_prompt: prompts/image_enrichment_prompt.py
  temperature: 0
  max_tokens: 4096
  timeout: 240

# Per-document FAISS index defaults.
indexing:
  index_root: indexes
  embed_batch_size: 32
  device:

# Retrieval defaults.
retrieval:
  text_threshold: 0.70
  table_threshold: 0.65
  image_threshold: 0.55
  text_candidate_k: 15
  table_candidate_k: 5
  image_candidate_k: 5
  min_text_chunks: 6
  max_table_chunks: 4
  max_image_chunks: 3

# Evidence packaging / montage defaults.
evidence:
  output_dir: data/output
  table_montage:
    enabled: true
    layout: vertical
    target_width: 1400
    max_pixels: 1003520
    min_pixels: 200704
    padding: 24
    label_height: 48
    background: white
    output_format: jpg
    jpeg_quality: 95
  image_montage:
    enabled: true
    layout: grid
    columns: 2
    cell_width: 900
    max_pixels: 1003520
    min_pixels: 200704
    padding: 24
    label_height: 48
    background: white
    output_format: jpg
    jpeg_quality: 95

# Final answer generation from an evidence package.
generation:
  prompt: prompts/search_prompt.py
  prompt_variable: VLM_QA_PROMPT
  temperature: 0
  max_tokens: 512
  timeout: 240
  max_context_chars: 1800
